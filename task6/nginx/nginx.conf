server {
    listen       80;
    server_name  localhost;

    location / {
        proxy_pass http://app:8000/;
        # ↑ trailing slash is important – prevents path duplication problems

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional but recommended additions:
        proxy_redirect off;
        proxy_buffering off;           # useful for real-time apps / streaming
        proxy_read_timeout 86400;      # long timeout if you have slow responses
    }

    # Optional: catch 404/50x errors nicely (custom page or redirect to /docs)
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}